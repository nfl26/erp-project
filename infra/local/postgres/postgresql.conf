# postgresql.conf — Configuración de desarrollo local
#
# REFERENCIA: estos parámetros se aplican via el campo `command` en docker-compose.yml.
# Para aplicarlos manualmente: docker compose exec postgres psql -U erp_admin
#   ALTER SYSTEM SET log_min_duration_statement = 200;
#   SELECT pg_reload_conf();

# ── Logging útil para dev ──────────────────────────────────────────────────
log_min_duration_statement = 200        # Loguea queries lentas (>200ms)
log_line_prefix = '%t [%p]: [%l-1] '   # Timestamp + PID
log_connections = off                   # Evita spam de logs de conexión
log_disconnections = off

# ── Memoria (ajustado para MacBook M2 / 8GB RAM) ──────────────────────────
shared_buffers = 128MB                  # 128MB es suficiente para dev
work_mem = 8MB
maintenance_work_mem = 64MB

# ── Conexiones ─────────────────────────────────────────────────────────────
max_connections = 100                   # Límite conservador para dev local

# ── Checkpoint (menos agresivo para dev) ───────────────────────────────────
checkpoint_completion_target = 0.9
wal_buffers = 16MB
