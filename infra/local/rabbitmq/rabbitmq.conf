# RabbitMQ — Configuración local de desarrollo

# Carga definiciones: vhost /erp, exchanges topic, DLQs
# Los usuarios dev-publisher y dev-consumer se crean vía rabbitmqctl
# en ./scripts/dev-up.sh para que los passwords vengan de .env
load_definitions = /etc/rabbitmq/definitions.json

# Management UI
management.tcp.port = 15672

# Logging — solo warnings en dev para reducir ruido
log.console = true
log.console.level = warning
log.file = false
