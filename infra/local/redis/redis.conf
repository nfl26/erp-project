# Redis — Configuración local de desarrollo
# Sin password (solo dev local). En staging usar requirepass.

# Guardar snapshot cada 60s si hubo al menos 1 cambio
save 60 1

# Límite de memoria conservador para dev (BullMQ + caché de sesiones)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel warning

# Persistencia de appendonly para durabilidad en dev
appendonly yes
appendfsync everysec
