services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15.5-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?Copie .env.example a .env y configure POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copie .env.example a .env y configure POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:?Copie .env.example a .env y configure POSTGRES_DB}
    ports:
      # Puerto hacia el host — para acceso desde IDE, psql, prisma studio
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - erp_postgres_data:/var/lib/postgresql/data
      # Scripts de init: se ejecutan en orden alfanumérico al crear el volumen
      - ./infra/local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - erp-network

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: erp_redis
    ports:
      # Puerto hacia el host — para acceso desde IDE / BullMQ dashboard
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - erp_redis_data:/data
      - ./infra/local/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 6
    networks:
      - erp-network

  # ── pgAdmin 4 ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: erp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL:?Configure PGADMIN_DEFAULT_EMAIL en .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Configure PGADMIN_DEFAULT_PASSWORD en .env}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      # Puerto hacia el host — abrir en http://localhost:5050
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - erp_pgadmin_data:/var/lib/pgadmin
      # Servidor pre-configurado: "ERP Local" apunta a postgres
      - ./infra/local/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network

  # ── RabbitMQ 3.12 ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: erp_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER:  ${RABBITMQ_DEFAULT_USER:?Configure RABBITMQ_DEFAULT_USER en .env}
      RABBITMQ_DEFAULT_PASS:  ${RABBITMQ_DEFAULT_PASS:?Configure RABBITMQ_DEFAULT_PASS en .env}
      RABBITMQ_DEFAULT_VHOST: "/"
    ports:
      # Puerto AMQP — conexiones desde la aplicación NestJS
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      # Puerto Management UI — abrir en http://localhost:15672
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - erp_rabbitmq_data:/var/lib/rabbitmq
      - ./infra/local/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/local/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/local/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - erp-network

  # TODO T-010: Keycloak — descomentar cuando se implemente la autenticación OAuth2
  # keycloak:
  #   image: quay.io/keycloak/keycloak:23.0
  #   container_name: erp_keycloak
  #   ...

# ── Volúmenes nombrados ────────────────────────────────────────────────────
# Datos en volúmenes Docker, no en bind mounts, para evitar conflictos
# con el workspace y facilitar backups por servicio.
volumes:
  erp_postgres_data:
  erp_redis_data:
  erp_pgadmin_data:
  erp_rabbitmq_data:

# ── Red interna ────────────────────────────────────────────────────────────
# Todos los servicios se referencian por nombre de contenedor (DNS interno),
# nunca por localhost ni por IP.
networks:
  erp-network:
    driver: bridge
    name: erp-network
