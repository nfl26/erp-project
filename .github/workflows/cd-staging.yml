name: CD Staging

on:
  push:
    branches: [main]

jobs:
  # ─── Job 1: Build Docker image y push a GHCR ────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nfl26/erp-api
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/erp-api
          file: services/erp-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Crear GitHub Release ────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            const sha      = context.sha;
            const shortSha = sha.substring(0, 7);
            const date     = new Date().toISOString().split('T')[0];
            const digest   = '${{ needs.build-and-push.outputs.image-digest }}';

            await github.rest.repos.createRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              tag_name:   `v${date}-${shortSha}`,
              name:       `Release ${date} (${shortSha})`,
              body: [
                `**Commit:** \`${sha}\``,
                `**Date:** ${date}`,
                `**Image:** \`ghcr.io/nfl26/erp-api:${sha}\``,
                `**Digest:** \`${digest}\``,
                '',
                '_Automatic release on merge to main._',
                '',
                '> Deploy real a staging viene en T-018 (Kubernetes + ArgoCD).'
              ].join('\n'),
              draft:      false,
              prerelease: false
            });
